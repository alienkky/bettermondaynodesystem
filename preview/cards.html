<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="background:var(--paper);">
  <!-- Furniture card -->
  <div style="background:var(--cream); border:2px solid var(--border-card); border-radius:16px; padding:16px; box-shadow:var(--sh-md); display:flex; gap:14px; align-items:center;">
    <div style="width:68px; height:68px; border-radius:12px; background:var(--cream-warm); display:flex; align-items:center; justify-content:center; font-size:36px; flex-shrink:0;">🪑</div>
    <div style="flex:1;">
      <div style="font-weight:800; font-size:16px; color:var(--ink);">오크 카운터</div>
      <div style="font-size:13px; color:var(--fg-2); margin-top:2px;">첫 번째 가구 · 매장의 시작</div>
      <div style="display:flex; gap:8px; margin-top:8px; font-size:12px; font-weight:700;">
        <span style="color:#8A5408;">💰 12</span>
        <span style="color:var(--fg-3);">→</span>
        <span style="color:#B86A10;">⚡ +5</span>
      </div>
    </div>
    <button style="background:var(--roast); color:var(--cream); border:none; padding:10px 16px; border-radius:8px; font-weight:700; font-size:14px;">배치</button>
  </div>
  <!-- Order card -->
  <div style="background:var(--cream); border:2px solid var(--border-card); border-radius:16px; padding:14px; box-shadow:var(--sh-md); margin-top:12px; border-left:4px solid var(--el-fire);">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div style="display:flex; gap:10px; align-items:center;">
        <div style="width:36px; height:36px; border-radius:999px; background:#F8DEDF; display:flex; align-items:center; justify-content:center; font-size:20px;">🐅</div>
        <div>
          <div style="font-weight:800; font-size:14px;">에스프레소</div>
          <div style="font-size:11px; color:var(--fg-2);">호랑이띠 · 🔥 화</div>
        </div>
      </div>
      <div style="text-align:right; font-family:ui-monospace,monospace; font-weight:800; font-size:13px; color:var(--el-fire);">0:08</div>
    </div>
    <div style="height:4px; background:#F0E4D3; border-radius:2px; margin-top:10px; overflow:hidden;">
      <div style="height:100%; width:60%; background:var(--el-fire); border-radius:2px;"></div>
    </div>
  </div>
</div></body></html>
