<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="background:var(--paper);">
  <!-- customer bubble -->
  <div style="display:flex; gap:12px; align-items:flex-start;">
    <div style="width:52px; height:52px; border-radius:999px; background:#F8DEDF; display:flex; align-items:center; justify-content:center; font-size:28px; border:2px solid var(--el-fire); flex-shrink:0;">🐅</div>
    <div style="background:#fff; border:2px solid var(--border-card); border-radius:16px; padding:12px 16px; font-family:var(--font-sans); font-weight:500; font-size:16px; color:var(--ink); letter-spacing:-0.005em; box-shadow:var(--sh-sm); max-width:420px;">
      에스프레소 더블샷으로 주세요. 오늘 정말 힘든 하루였어요.
    </div>
  </div>
  <!-- slime bubble -->
  <div style="display:flex; gap:12px; align-items:flex-start; margin-top:14px;">
    <img src="../assets/slimes/aroma.svg" width="52" height="52" style="flex-shrink:0;">
    <div style="background:#FFF8E8; border:2px solid #D4A64A; border-radius:16px; padding:12px 16px; font-family:var(--font-sans); font-weight:500; font-size:16px; color:#5A3F10; letter-spacing:-0.005em; box-shadow:var(--sh-sm); max-width:420px;">
      저는 아로마 슬라임이에요. 음료 품질을 높여드릴게요.
    </div>
  </div>
</div></body></html>
