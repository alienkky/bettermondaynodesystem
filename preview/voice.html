<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="background:var(--paper);">
  <div style="max-width:420px;">
    <div style="font-family:var(--font-sans); font-weight:600; font-size:18px; color:var(--ink); line-height:1.45; letter-spacing:-0.01em;">"점주님, 안녕하세요. 베러먼데이에 오신 걸 환영합니다."</div>
    <div style="font-size:12px; color:var(--fg-2); margin-top:4px;">— NPC warmth, 감정 먼저</div>
  </div>
  <hr style="border:none; border-top:1px solid var(--border-hair); margin:16px 0;">
  <div style="max-width:420px;">
    <div style="font-family:var(--font-sans); font-weight:500; font-size:15px; color:var(--ink); line-height:1.55;">같은 재료 2개를 드래그하면 상위 등급이 됩니다</div>
    <div style="font-size:12px; color:var(--fg-2); margin-top:4px;">— UI body, no ending period on short strings</div>
  </div>
  <hr style="border:none; border-top:1px solid var(--border-hair); margin:16px 0;">
  <div style="max-width:420px;">
    <div style="font-family:var(--font-sans); font-weight:800; font-size:18px; color:var(--el-fire);">🔥 공명!</div>
    <div style="font-family:var(--font-sans); font-weight:500; font-size:13px; color:var(--fg-2); margin-top:2px;">같은 원소의 손님이에요 · 팁 ×1.5</div>
    <div style="font-size:12px; color:var(--fg-3); margin-top:4px;">— Reaction line, emoji as semantic token</div>
  </div>
</div></body></html>
