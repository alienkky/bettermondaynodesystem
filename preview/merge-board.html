<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="background:var(--paper);">
  <!-- Merge board mini -->
  <div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:4px; background:var(--cream); border:2px solid var(--border-card); border-radius:12px; padding:8px; width:280px; box-shadow:var(--sh-md);">
    <!-- 7x7 -->
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px;"></div>
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px; display:flex; align-items:center; justify-content:center;"><img src="../assets/slimes/aroma.svg" style="width:80%"></div>
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px;"></div>
    <div style="aspect-ratio:1; background:var(--board-locked); border-radius:4px;"></div>
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px; display:flex; align-items:center; justify-content:center;"><img src="../assets/slimes/creamy.svg" style="width:80%"></div>
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px;"></div>
    <div style="aspect-ratio:1; background:var(--board-locked); border-radius:4px;"></div>

    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px;"></div>
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px;"></div>
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px; display:flex; align-items:center; justify-content:center;"><img src="../assets/slimes/aroma.svg" style="width:80%"></div>
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px;"></div>
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px;"></div>
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px; display:flex; align-items:center; justify-content:center;"><img src="../assets/slimes/matcha.svg" style="width:80%"></div>
    <div style="aspect-ratio:1; background:var(--board-locked); border-radius:4px;"></div>

    <div style="aspect-ratio:1; background:var(--board-locked); border-radius:4px;"></div>
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px; display:flex; align-items:center; justify-content:center;"><img src="../assets/slimes/bubble.svg" style="width:80%"></div>
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px;"></div>
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px;"></div>
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px; display:flex; align-items:center; justify-content:center;"><img src="../assets/slimes/caramel.svg" style="width:80%"></div>
    <div style="aspect-ratio:1; background:var(--board-cell); border-radius:4px;"></div>
    <div style="aspect-ratio:1; background:var(--board-locked); border-radius:4px;"></div>
  </div>
  <div style="margin-top:10px; font-family:var(--font-sans); font-size:12px; color:var(--fg-2);">
    7×7 merge board · unlocked cells cream, locked cells dim · drag matching slimes to fuse · drop on order slot to deliver.
  </div>
</div></body></html>
