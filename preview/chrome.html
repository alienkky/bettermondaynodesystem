<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="background:var(--paper);">
  <!-- HUD bar -->
  <div style="height:56px; background:var(--cream); border:2px solid var(--border-card); border-radius:14px; display:flex; align-items:center; padding:0 14px; gap:10px; box-shadow:var(--sh-sm);">
    <div style="display:flex; align-items:center; gap:6px; background:var(--roast); color:var(--cream); padding:4px 10px; border-radius:999px; font-weight:800; font-size:12px;">LV <span class="mono">12</span></div>
    <div style="flex:1; height:8px; background:var(--bg-sunken); border-radius:4px; overflow:hidden;"><div style="width:42%; height:100%; background:var(--roast);"></div></div>
    <div style="display:inline-flex; align-items:center; gap:4px; font-family:var(--font-sans); font-weight:800; font-size:13px;"><img src="../assets/currency/energy.svg" width="18" height="18"><span class="mono">98</span></div>
    <div style="display:inline-flex; align-items:center; gap:4px; font-family:var(--font-sans); font-weight:800; font-size:13px;"><img src="../assets/currency/coin.svg" width="18" height="18"><span class="mono">1,240</span></div>
    <div style="display:inline-flex; align-items:center; gap:4px; font-family:var(--font-sans); font-weight:800; font-size:13px;"><img src="../assets/currency/gem.svg" width="18" height="18"><span class="mono">24</span></div>
  </div>
  <!-- Bottom nav -->
  <div style="height:72px; background:var(--cream); border:2px solid var(--border-card); border-radius:14px; display:flex; margin-top:12px; box-shadow:var(--sh-sm);">
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:var(--roast); font-weight:800;"><div style="font-size:20px;">🏪</div><div style="font-size:11px;">매장</div></div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:var(--fg-3); font-weight:700;"><div style="font-size:20px;">🧪</div><div style="font-size:11px;">작업실</div></div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:var(--fg-3); font-weight:700;"><div style="font-size:20px;">📚</div><div style="font-size:11px;">도감</div></div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:var(--fg-3); font-weight:700;"><div style="font-size:20px;">⚙</div><div style="font-size:11px;">설정</div></div>
  </div>
</div></body></html>
