<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="swatch" style="background:#6B3F2A; color:#F7EFE2;"><div class="name">Roast</div><div class="hex">#6B3F2A</div></div>
    <div class="swatch" style="background:#4A2A1C; color:#F7EFE2;"><div class="name">Roast Deep</div><div class="hex">#4A2A1C</div></div>
    <div class="swatch" style="background:#A67A5A; color:#1F1A17;"><div class="name">Roast Soft</div><div class="hex">#A67A5A</div></div>
    <div class="swatch" style="background:#1F1A17; color:#F7EFE2;"><div class="name">Ink 먹색</div><div class="hex">#1F1A17</div></div>
    <div class="swatch" style="background:#F7EFE2; color:#1F1A17; border:1px solid var(--border-hair);"><div class="name">Cream</div><div class="hex">#F7EFE2</div></div>
    <div class="swatch" style="background:#EFE3CC; color:#1F1A17;"><div class="name">Cream Warm</div><div class="hex">#EFE3CC</div></div>
    <div class="swatch" style="background:#FAF6EE; color:#1F1A17; border:1px solid var(--border-hair);"><div class="name">Paper</div><div class="hex">#FAF6EE</div></div>
    <div class="swatch" style="background:#3E342E; color:#F7EFE2;"><div class="name">Ink Soft</div><div class="hex">#3E342E</div></div>
  </div>
</div></body></html>
