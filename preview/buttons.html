<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <button style="background:var(--roast); color:var(--cream); border:none; padding:12px 20px; border-radius:8px; font-weight:700; font-size:14px; font-family:var(--font-sans); box-shadow:0 4px 12px rgba(31,26,23,.10); cursor:pointer;">주문 받기</button>
    <button style="background:transparent; color:var(--roast); border:2px solid var(--roast); padding:10px 18px; border-radius:8px; font-weight:700; font-size:14px; font-family:var(--font-sans); cursor:pointer;">다시 만들기</button>
    <button style="background:var(--cream-warm); color:var(--ink); border:none; padding:12px 20px; border-radius:8px; font-weight:700; font-size:14px; font-family:var(--font-sans); cursor:pointer;">나중에</button>
    <button style="background:var(--el-fire); color:#fff; border:none; padding:12px 20px; border-radius:8px; font-weight:700; font-size:14px; font-family:var(--font-sans); box-shadow:0 4px 12px rgba(200,56,60,.25); cursor:pointer;">⚡ 스피드업</button>
    <button disabled style="background:#E8DFD0; color:#A39A92; border:none; padding:12px 20px; border-radius:8px; font-weight:700; font-size:14px; font-family:var(--font-sans);">잠김</button>
  </div>
  <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:12px;">
    <button style="background:var(--roast); color:var(--cream); border:none; padding:8px 14px; border-radius:6px; font-weight:700; font-size:12px; font-family:var(--font-sans);">Small</button>
    <button style="background:var(--roast); color:var(--cream); border:none; padding:16px 28px; border-radius:10px; font-weight:800; font-size:16px; font-family:var(--font-sans);">Large CTA</button>
    <button style="background:var(--cream); color:var(--ink); border:none; padding:10px; border-radius:999px; width:40px; height:40px; font-size:18px; box-shadow:0 4px 12px rgba(31,26,23,.10);">×</button>
  </div>
</div></body></html>
