<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <span style="display:inline-flex; align-items:center; gap:6px; background:var(--cream); border:1.5px solid var(--border-card); color:var(--ink); padding:6px 12px; border-radius:999px; font-weight:700; font-size:13px; font-family:var(--font-sans); box-shadow:var(--sh-sm);">
      <img src="../assets/currency/coin.svg" width="18" height="18"> <span class="mono">1,240</span></span>
    <span style="display:inline-flex; align-items:center; gap:6px; background:var(--cream); border:1.5px solid var(--border-card); color:var(--ink); padding:6px 12px; border-radius:999px; font-weight:700; font-size:13px; font-family:var(--font-sans); box-shadow:var(--sh-sm);">
      <img src="../assets/currency/gem.svg" width="18" height="18"> <span class="mono">24</span></span>
    <span style="display:inline-flex; align-items:center; gap:6px; background:var(--cream); border:1.5px solid var(--border-card); color:var(--ink); padding:6px 12px; border-radius:999px; font-weight:700; font-size:13px; font-family:var(--font-sans); box-shadow:var(--sh-sm);">
      <img src="../assets/currency/energy.svg" width="18" height="18"> <span class="mono">98 / 200</span></span>
    <span style="display:inline-flex; align-items:center; gap:6px; background:var(--roast); color:var(--cream); padding:6px 12px; border-radius:999px; font-weight:700; font-size:13px; font-family:var(--font-sans);">
      ☕ 베먼 크레딧 <span class="mono">0</span></span>
  </div>
  <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
    <span style="display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:999px; background:#F8DEDF; color:#7A1F22; font-size:13px; font-weight:700;">🔥 화</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:999px; background:#E3F3DA; color:#2E5A1E; font-size:13px; font-weight:700;">🌿 목</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:999px; background:#F0E4D3; color:#6B4A22; font-size:13px; font-weight:700;">⛰️ 토</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:999px; background:#F8EED2; color:#7A5E14; font-size:13px; font-weight:700;">🪙 금</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:999px; background:#DCEBF5; color:#2C5A82; font-size:13px; font-weight:700;">💧 수</span>
  </div>
</div></body></html>
