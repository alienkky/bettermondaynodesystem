<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="grid" style="grid-template-columns: repeat(4, 1fr); gap:10px;">
    <div class="swatch" style="background:#D4A64A; color:#4A2A1C;"><div class="name">💰 Coin</div><div class="hex">#D4A64A</div></div>
    <div class="swatch" style="background:#5FA8D3; color:#fff;"><div class="name">💙 Gem</div><div class="hex">#5FA8D3</div></div>
    <div class="swatch" style="background:#E8A020; color:#fff;"><div class="name">⚡ Energy</div><div class="hex">#E8A020</div></div>
    <div class="swatch" style="background:#6B3F2A; color:#F7EFE2;"><div class="name">☕ Credit</div><div class="hex">#6B3F2A</div></div>
    <div class="swatch" style="background:#3E7A4E; color:#fff;"><div class="name">Success</div><div class="hex">#3E7A4E</div></div>
    <div class="swatch" style="background:#E8A020; color:#fff;"><div class="name">Warning</div><div class="hex">#E8A020</div></div>
    <div class="swatch" style="background:#C8383C; color:#fff;"><div class="name">Danger</div><div class="hex">#C8383C</div></div>
    <div class="swatch" style="background:#4E8FB8; color:#fff;"><div class="name">Info</div><div class="hex">#4E8FB8</div></div>
  </div>
</div></body></html>
