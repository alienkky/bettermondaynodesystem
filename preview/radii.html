<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:16px;">
    <div style="text-align:center;"><div style="background:var(--cream-warm); width:72px; height:72px; border-radius:2px; margin:0 auto; border:1px solid var(--border-hair);"></div><div style="font-size:12px; margin-top:8px;"><b>xs</b> · 2px</div><div style="font-size:11px; color:var(--fg-2);">chips, tokens</div></div>
    <div style="text-align:center;"><div style="background:var(--cream-warm); width:72px; height:72px; border-radius:8px; margin:0 auto; border:1px solid var(--border-hair);"></div><div style="font-size:12px; margin-top:8px;"><b>sm</b> · 8px</div><div style="font-size:11px; color:var(--fg-2);">buttons</div></div>
    <div style="text-align:center;"><div style="background:var(--cream-warm); width:72px; height:72px; border-radius:12px; margin:0 auto; border:1px solid var(--border-hair);"></div><div style="font-size:12px; margin-top:8px;"><b>md</b> · 12px</div><div style="font-size:11px; color:var(--fg-2);">inputs</div></div>
    <div style="text-align:center;"><div style="background:var(--cream-warm); width:72px; height:72px; border-radius:16px; margin:0 auto; border:1px solid var(--border-hair);"></div><div style="font-size:12px; margin-top:8px;"><b>lg</b> · 16px</div><div style="font-size:11px; color:var(--fg-2);">cards</div></div>
    <div style="text-align:center;"><div style="background:var(--cream-warm); width:72px; height:72px; border-radius:999px; margin:0 auto; border:1px solid var(--border-hair);"></div><div style="font-size:12px; margin-top:8px;"><b>pill</b></div><div style="font-size:11px; color:var(--fg-2);">capsules</div></div>
  </div>
</div></body></html>
