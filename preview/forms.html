<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div style="display:flex; gap:14px; flex-wrap:wrap;">
    <div style="flex:1 1 220px;">
      <div style="font-weight:800; font-size:13px; margin-bottom:6px;">Text input</div>
      <input type="text" placeholder="점주 이름" value="김점주" style="width:100%; padding:12px 14px; border:2px solid var(--border-card); border-radius:12px; background:var(--cream); font-family:var(--font-sans); font-size:15px; font-weight:500; color:var(--ink); outline:none;">
    </div>
    <div style="flex:1 1 220px;">
      <div style="font-weight:800; font-size:13px; margin-bottom:6px;">Focused</div>
      <input type="text" value="베러먼데이" style="width:100%; padding:12px 14px; border:2px solid var(--roast); border-radius:12px; background:#fff; font-family:var(--font-sans); font-size:15px; font-weight:500; color:var(--ink); outline:none; box-shadow:0 0 0 4px rgba(107,63,42,0.12);">
    </div>
  </div>
  <div style="margin-top:16px;">
    <div style="font-weight:800; font-size:13px; margin-bottom:8px;">Segmented (오행 선택)</div>
    <div style="display:inline-flex; background:var(--bg-sunken); border-radius:12px; padding:4px; gap:2px;">
      <button style="background:var(--roast); color:var(--cream); border:none; padding:8px 14px; border-radius:9px; font-weight:800; font-size:13px; font-family:var(--font-sans);">🔥 화</button>
      <button style="background:transparent; color:var(--fg-2); border:none; padding:8px 14px; border-radius:9px; font-weight:700; font-size:13px; font-family:var(--font-sans);">🌿 목</button>
      <button style="background:transparent; color:var(--fg-2); border:none; padding:8px 14px; border-radius:9px; font-weight:700; font-size:13px; font-family:var(--font-sans);">⛰️ 토</button>
      <button style="background:transparent; color:var(--fg-2); border:none; padding:8px 14px; border-radius:9px; font-weight:700; font-size:13px; font-family:var(--font-sans);">🪙 금</button>
      <button style="background:transparent; color:var(--fg-2); border:none; padding:8px 14px; border-radius:9px; font-weight:700; font-size:13px; font-family:var(--font-sans);">💧 수</button>
    </div>
  </div>
</div></body></html>
