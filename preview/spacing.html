<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div style="display:flex; gap:16px; align-items:flex-end;">
    <div style="width:16px; background:var(--roast); border-radius:4px; height:8px;"></div>
    <div style="width:16px; background:var(--roast); border-radius:4px; height:16px;"></div>
    <div style="width:16px; background:var(--roast); border-radius:4px; height:24px;"></div>
    <div style="width:16px; background:var(--roast); border-radius:4px; height:32px;"></div>
    <div style="width:16px; background:var(--roast); border-radius:4px; height:48px;"></div>
    <div style="width:16px; background:var(--roast); border-radius:4px; height:64px;"></div>
  </div>
  <div style="display:flex; gap:16px; margin-top:8px; font-size:11px; color:var(--fg-2); font-family:ui-monospace,monospace;">
    <div style="width:16px; text-align:center;">1</div>
    <div style="width:16px; text-align:center;">2</div>
    <div style="width:16px; text-align:center;">3</div>
    <div style="width:16px; text-align:center;">4</div>
    <div style="width:16px; text-align:center;">6</div>
    <div style="width:16px; text-align:center;">8</div>
  </div>
  <div style="margin-top:16px; font-family:var(--font-sans); font-size:13px; color:var(--fg-2);">8pt grid · 4pt half-step · tokens: <span class="mono">--s-1=4 · --s-2=8 · --s-3=12 · --s-4=16 · --s-6=24 · --s-8=32</span></div>
</div></body></html>
